<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Quiz - Unirse al Juego</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Montserrat', sans-serif;
      background: #0a0a23;
      color: #fff;
      min-height: 100dvh;
      overflow-x: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .bg-particles {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background:
        radial-gradient(circle at 30% 40%, rgba(120, 0, 255, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 70% 60%, rgba(0, 200, 255, 0.1) 0%, transparent 50%);
      z-index: 0;
    }
    .app { position: relative; z-index: 1; width: 100%; max-width: 500px; padding: 20px; text-align: center; }

    /* ── Join Screen ── */
    #join-screen {}
    .join-logo { font-size: 2.5rem; font-weight: 900; margin-bottom: 5px; background: linear-gradient(135deg, #667eea, #764ba2, #f093fb); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .join-sub { color: #a0a0cc; font-size: 0.9rem; margin-bottom: 35px; }
    .input-group { position: relative; margin-bottom: 20px; }
    .nickname-input {
      width: 100%; padding: 18px 20px; border: 2px solid rgba(102,126,234,0.4);
      background: rgba(255,255,255,0.06); border-radius: 14px; color: #fff;
      font-family: 'Montserrat', sans-serif; font-size: 1.2rem; font-weight: 600;
      text-align: center; outline: none; transition: border-color 0.3s;
    }
    .nickname-input::placeholder { color: rgba(255,255,255,0.3); }
    .nickname-input:focus { border-color: #667eea; background: rgba(102,126,234,0.1); }
    .char-count { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); font-size: 0.75rem; color: #555; }
    .btn {
      display: inline-block; width: 100%; padding: 18px; border: none; border-radius: 14px;
      font-family: 'Montserrat', sans-serif; font-size: 1.2rem; font-weight: 700;
      cursor: pointer; transition: all 0.3s; text-transform: uppercase; letter-spacing: 2px;
    }
    .btn-join {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff; box-shadow: 0 8px 30px rgba(102,126,234,0.4);
    }
    .btn-join:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(102,126,234,0.6); }
    .btn-join:active { transform: translateY(0); }
    .btn-join:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .error-msg { color: #ff6b6b; font-size: 0.85rem; margin-top: 10px; min-height: 20px; }
    .avatar-preview {
      width: 90px; height: 90px; border-radius: 50%; margin: 0 auto 25px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem; font-weight: 900; border: 3px solid rgba(102,126,234,0.5);
      transition: all 0.3s;
    }

    /* ── Waiting Screen ── */
    #waiting-screen { display: none; }
    .waiting-icon { font-size: 4rem; margin-bottom: 15px; animation: bounce 2s infinite; }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }
    .waiting-name { font-size: 1.8rem; font-weight: 900; margin-bottom: 8px; background: linear-gradient(135deg, #00f5a0, #00d9f5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .waiting-msg { color: #a0a0cc; font-size: 1rem; }
    .fun-fact {
      margin-top: 30px; padding: 20px; background: rgba(255,255,255,0.05);
      border-radius: 14px; border-left: 4px solid #667eea; text-align: left;
    }
    .fun-fact-label { font-size: 0.75rem; color: #667eea; font-weight: 700; margin-bottom: 5px; text-transform: uppercase; }
    .fun-fact-text { font-size: 0.9rem; color: #ccc; line-height: 1.5; }

    /* ── Question Screen ── */
    #question-player { display: none; }
    .q-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .q-num { font-size: 0.85rem; color: #a0a0cc; }
    .q-cat { background: rgba(102,126,234,0.3); padding: 4px 14px; border-radius: 15px; font-size: 0.75rem; font-weight: 600; color: #667eea; }
    .q-timer-bar { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; margin-bottom: 15px; overflow: hidden; }
    .q-timer-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, #00f5a0, #00d9f5); transition: width 1s linear; }
    .q-timer-fill.warning { background: linear-gradient(90deg, #f7b731, #ffa502); }
    .q-timer-fill.danger { background: linear-gradient(90deg, #ff6b6b, #ee5a24); }
    .q-text { font-size: 1.15rem; font-weight: 700; margin-bottom: 18px; line-height: 1.4; padding: 18px; background: rgba(255,255,255,0.05); border-radius: 14px; }
    .q-options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .q-opt {
      padding: 20px 10px; border-radius: 14px; border: none;
      font-family: 'Montserrat', sans-serif; font-size: 1rem; font-weight: 700;
      color: #fff; cursor: pointer; transition: all 0.2s;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 8px; min-height: 90px; position: relative; overflow: hidden;
    }
    .q-opt:active { transform: scale(0.95); }
    .q-opt.selected { opacity: 0.7; transform: scale(0.95); }
    .q-opt.disabled { pointer-events: none; opacity: 0.5; }
    .q-opt .shape { font-size: 1.8rem; }
    .q-opt .opt-text { font-size: 0.85rem; line-height: 1.2; }
    .opt-0 { background: #e21b3c; }
    .opt-1 { background: #1368ce; }
    .opt-2 { background: #d89e00; }
    .opt-3 { background: #26890c; }
    .q-time-left { text-align: center; font-size: 2.5rem; font-weight: 900; margin-bottom: 10px; }

    /* ── Answer Result ── */
    #result-player { display: none; }
    .result-icon { font-size: 5rem; margin-bottom: 15px; }
    .result-icon.correct { animation: correctPop 0.5s ease; }
    .result-icon.wrong { animation: shake 0.5s ease; }
    @keyframes correctPop {
      0% { transform: scale(0); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }
    .result-text { font-size: 1.5rem; font-weight: 900; margin-bottom: 8px; }
    .result-text.correct { color: #00f5a0; }
    .result-text.wrong { color: #ff6b6b; }
    .result-points { font-size: 2.5rem; font-weight: 900; margin: 10px 0; }
    .result-points.correct { background: linear-gradient(135deg, #00f5a0, #00d9f5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .result-streak { color: #f7b731; font-size: 1rem; font-weight: 600; }
    .result-total { color: #a0a0cc; font-size: 0.9rem; margin-top: 15px; }
    .result-waiting { color: #667eea; font-size: 0.85rem; margin-top: 20px; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    /* ── Leaderboard Player ── */
    #leaderboard-player { display: none; }
    .lb-p-title { font-size: 1.5rem; font-weight: 900; margin-bottom: 20px; color: #ffd700; }
    .lb-p-position {
      font-size: 5rem; font-weight: 900; margin: 15px 0;
      background: linear-gradient(135deg, #ffd700, #ffaa00);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .lb-p-label { color: #a0a0cc; font-size: 0.9rem; }
    .lb-p-score { font-size: 1.3rem; font-weight: 700; color: #00f5a0; margin-top: 10px; }
    .lb-p-next { color: #667eea; font-size: 0.85rem; margin-top: 25px; animation: pulse 1.5s infinite; }

    /* ── Final Player ── */
    #final-player { display: none; }
    .fp-title { font-size: 1.8rem; font-weight: 900; margin-bottom: 20px; }
    .fp-rank { font-size: 6rem; font-weight: 900; margin: 10px 0; }
    .fp-rank.first { background: linear-gradient(135deg, #ffd700, #ffaa00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .fp-rank.top3 { background: linear-gradient(135deg, #c0c0c0, #e0e0e0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .fp-score { font-size: 1.5rem; font-weight: 700; color: #00f5a0; }
    .fp-stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 25px; }
    .fp-stat {
      background: rgba(255,255,255,0.06); border-radius: 12px; padding: 15px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .fp-stat-num { font-size: 1.8rem; font-weight: 900; }
    .fp-stat-label { font-size: 0.75rem; color: #a0a0cc; margin-top: 3px; }

    /* ── Disconnected ── */
    #disconnected { display: none; text-align: center; padding: 40px 20px; }
    .dc-icon { font-size: 3rem; margin-bottom: 15px; }
    .dc-text { font-size: 1.1rem; color: #ff6b6b; font-weight: 600; margin-bottom: 20px; }
    .btn-reconnect { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="bg-particles"></div>
  <div class="app">

    <!-- JOIN -->
    <div id="join-screen">
      <div class="join-logo">QUIZ</div>
      <div class="join-sub">Seguridad Informática & GNU/Linux</div>
      <div class="avatar-preview" id="avatar-preview">?</div>
      <div class="input-group">
        <input type="text" class="nickname-input" id="nickname-input" placeholder="Tu nickname" maxlength="20" autocomplete="off" autofocus>
        <span class="char-count" id="char-count">0/20</span>
      </div>
      <button class="btn btn-join" id="btn-join" disabled>Unirse</button>
      <div class="error-msg" id="error-msg"></div>
    </div>

    <!-- WAITING -->
    <div id="waiting-screen">
      <div class="waiting-icon">🎮</div>
      <div class="waiting-name" id="waiting-name"></div>
      <div class="waiting-msg">Esperando a que el profesor inicie el juego...</div>
      <div class="fun-fact">
        <div class="fun-fact-label">Sabías que...</div>
        <div class="fun-fact-text" id="fun-fact-text"></div>
      </div>
    </div>

    <!-- QUESTION -->
    <div id="question-player">
      <div class="q-header">
        <span class="q-num" id="pq-num">1 / 30</span>
        <span class="q-cat" id="pq-cat">Virus</span>
      </div>
      <div class="q-time-left" id="pq-time">20</div>
      <div class="q-timer-bar"><div class="q-timer-fill" id="pq-timer-fill"></div></div>
      <div class="q-text" id="pq-text"></div>
      <div class="q-options" id="pq-options"></div>
    </div>

    <!-- ANSWER RESULT -->
    <div id="result-player">
      <div class="result-icon" id="result-icon"></div>
      <div class="result-text" id="result-text"></div>
      <div class="result-points" id="result-points"></div>
      <div class="result-streak" id="result-streak"></div>
      <div class="result-total" id="result-total"></div>
      <div class="result-waiting">Esperando siguiente pregunta...</div>
    </div>

    <!-- LEADERBOARD -->
    <div id="leaderboard-player">
      <div class="lb-p-title">RANKING</div>
      <div class="lb-p-position" id="lb-p-pos">#1</div>
      <div class="lb-p-label">Tu posición</div>
      <div class="lb-p-score" id="lb-p-score">0 pts</div>
      <div class="lb-p-next">Preparándose la siguiente pregunta...</div>
    </div>

    <!-- FINAL -->
    <div id="final-player">
      <div class="fp-title">Juego Terminado</div>
      <div class="fp-rank" id="fp-rank">#1</div>
      <div class="fp-score" id="fp-score">0 puntos</div>
      <div class="fp-stats-grid" id="fp-stats"></div>
    </div>

    <!-- DISCONNECTED -->
    <div id="disconnected">
      <div class="dc-icon">📡</div>
      <div class="dc-text">Conexión perdida</div>
      <button class="btn btn-reconnect" onclick="location.reload()">Reconectar</button>
    </div>

  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const shapes = ['&#9650;', '&#9670;', '&#9679;', '&#9632;'];
    const optClasses = ['opt-0','opt-1','opt-2','opt-3'];
    let myNickname = '';
    let timerInterval = null;
    let answered = false;

    const funFacts = [
      "El primer virus informático, Creeper, fue creado en 1971 y mostraba el mensaje 'I\'m the creeper, catch me if you can!'",
      "ClamAV es un antivirus de código abierto que puede escanear más de 1 millón de virus conocidos.",
      "Linux es considerado más seguro que Windows por su modelo de permisos y la diversidad de distribuciones.",
      "El comando 'sudo' en Linux significa 'Super User DO' y permite ejecutar comandos con privilegios de administrador.",
      "Los paquetes .deb son el formato estándar de instalación en distribuciones basadas en Debian como Ubuntu.",
      "El término 'Malware' viene de 'Malicious Software' y engloba virus, troyanos, ransomware y más.",
      "Wireshark es una de las herramientas más usadas en el mundo para análisis de tráfico de red.",
      "El principio de mínimo privilegio es fundamental en seguridad: solo dar acceso a lo estrictamente necesario.",
      "Tor Browser usa una red de servidores voluntarios para ocultar tu dirección IP y proteger tu anonimato.",
      "Un rootkit puede ocultarse tan profundamente en el sistema que es casi indetectable sin herramientas especializadas.",
    ];

    // ── Input handling ──
    const input = document.getElementById('nickname-input');
    const btnJoin = document.getElementById('btn-join');
    const charCount = document.getElementById('char-count');
    const avatar = document.getElementById('avatar-preview');

    input.addEventListener('input', () => {
      const val = input.value.trim();
      charCount.textContent = `${input.value.length}/20`;
      btnJoin.disabled = val.length === 0;
      avatar.textContent = val.length > 0 ? val.charAt(0).toUpperCase() : '?';
      if (val.length > 0) {
        avatar.style.borderColor = '#667eea';
      } else {
        avatar.style.borderColor = 'rgba(102,126,234,0.3)';
      }
      document.getElementById('error-msg').textContent = '';
    });

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !btnJoin.disabled) joinGame();
    });

    btnJoin.addEventListener('click', joinGame);

    function joinGame() {
      const nickname = input.value.trim();
      if (!nickname) return;
      btnJoin.disabled = true;
      btnJoin.textContent = 'Conectando...';
      socket.emit('join', nickname);
    }

    // ── Socket Events ──
    socket.on('joined', data => {
      myNickname = data.nickname;
      showScreen('waiting-screen');
      document.getElementById('waiting-name').textContent = myNickname;
      document.getElementById('fun-fact-text').textContent = funFacts[Math.floor(Math.random() * funFacts.length)];
    });

    socket.on('join-error', msg => {
      document.getElementById('error-msg').textContent = msg;
      btnJoin.disabled = false;
      btnJoin.textContent = 'UNIRSE';
    });

    socket.on('game-started', () => {
      // just wait for first question
    });

    socket.on('question', data => {
      answered = false;
      showScreen('question-player');
      document.getElementById('pq-num').textContent = `${data.index + 1} / ${data.total}`;
      document.getElementById('pq-cat').textContent = data.category;
      document.getElementById('pq-text').textContent = data.question;

      const grid = document.getElementById('pq-options');
      grid.innerHTML = '';
      data.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = `q-opt ${optClasses[i]}`;
        btn.innerHTML = `<span class="shape">${shapes[i]}</span><span class="opt-text">${opt}</span>`;
        btn.addEventListener('click', () => submitAnswer(i, btn));
        grid.appendChild(btn);
      });

      startPlayerTimer(data.time);
    });

    socket.on('answer-result', data => {
      clearInterval(timerInterval);
      showScreen('result-player');

      const iconEl = document.getElementById('result-icon');
      const textEl = document.getElementById('result-text');
      const pointsEl = document.getElementById('result-points');
      const streakEl = document.getElementById('result-streak');
      const totalEl = document.getElementById('result-total');

      if (data.correct) {
        iconEl.textContent = '🎉';
        iconEl.className = 'result-icon correct';
        textEl.textContent = '¡Correcto!';
        textEl.className = 'result-text correct';
        pointsEl.textContent = `+${data.points}`;
        pointsEl.className = 'result-points correct';
        streakEl.textContent = data.streak > 1 ? `🔥 Racha de ${data.streak}` : '';
      } else {
        iconEl.textContent = '😞';
        iconEl.className = 'result-icon wrong';
        textEl.textContent = 'Incorrecto';
        textEl.className = 'result-text wrong';
        pointsEl.textContent = '+0';
        pointsEl.className = 'result-points';
        streakEl.textContent = '';
      }
      totalEl.textContent = `Puntuación total: ${data.totalScore.toLocaleString()}`;
    });

    socket.on('question-results', () => {
      // Host is showing results, player stays on their result screen
    });

    socket.on('leaderboard', data => {
      showScreen('leaderboard-player');
      const myPos = data.leaderboard.findIndex(p => p.nickname === myNickname);
      document.getElementById('lb-p-pos').textContent = `#${myPos + 1}`;
      const myData = data.leaderboard[myPos];
      document.getElementById('lb-p-score').textContent = myData ? `${myData.score.toLocaleString()} pts` : '0 pts';
    });

    socket.on('game-finished', data => {
      clearInterval(timerInterval);
      showScreen('final-player');
      const myPos = data.leaderboard.findIndex(p => p.nickname === myNickname);
      const rankEl = document.getElementById('fp-rank');
      rankEl.textContent = `#${myPos + 1}`;
      rankEl.className = myPos === 0 ? 'fp-rank first' : myPos < 3 ? 'fp-rank top3' : 'fp-rank';

      const myStat = data.playerStats.find(p => p.nickname === myNickname);
      document.getElementById('fp-score').textContent = myStat ? `${myStat.score.toLocaleString()} puntos` : '0 puntos';

      if (myStat) {
        document.getElementById('fp-stats').innerHTML = `
          <div class="fp-stat"><div class="fp-stat-num" style="color:#00f5a0">${myStat.correctCount}</div><div class="fp-stat-label">Correctas</div></div>
          <div class="fp-stat"><div class="fp-stat-num" style="color:#ff6b6b">${myStat.totalAnswered - myStat.correctCount}</div><div class="fp-stat-label">Incorrectas</div></div>
          <div class="fp-stat"><div class="fp-stat-num" style="color:#667eea">${myStat.accuracy}%</div><div class="fp-stat-label">Precisión</div></div>
          <div class="fp-stat"><div class="fp-stat-num" style="color:#ffd700">#${myPos + 1}</div><div class="fp-stat-label">Posición Final</div></div>
        `;
      }
    });

    socket.on('game-reset', () => {
      myNickname = '';
      answered = false;
      clearInterval(timerInterval);
      input.value = '';
      charCount.textContent = '0/20';
      avatar.textContent = '?';
      btnJoin.disabled = true;
      btnJoin.textContent = 'UNIRSE';
      showScreen('join-screen');
    });

    socket.on('disconnect', () => {
      clearInterval(timerInterval);
      showScreen('disconnected');
    });

    socket.on('connect', () => {
      if (document.getElementById('disconnected').style.display !== 'none' &&
          document.getElementById('disconnected').style.display !== '') {
        // Was disconnected, reload
        if (myNickname) location.reload();
      }
    });

    function showScreen(id) {
      ['join-screen','waiting-screen','question-player','result-player','leaderboard-player','final-player','disconnected'].forEach(s => {
        document.getElementById(s).style.display = s === id ? 'block' : 'none';
      });
    }

    function submitAnswer(index, btn) {
      if (answered) return;
      answered = true;
      document.querySelectorAll('.q-opt').forEach(b => b.classList.add('disabled'));
      btn.classList.add('selected');
      btn.style.opacity = '1';
      btn.style.transform = 'scale(1.05)';
      socket.emit('answer', { answer: index });
    }

    function startPlayerTimer(seconds) {
      clearInterval(timerInterval);
      let timeLeft = seconds;
      const fill = document.getElementById('pq-timer-fill');
      const timeDisplay = document.getElementById('pq-time');
      fill.style.width = '100%';
      fill.classList.remove('warning', 'danger');
      timeDisplay.textContent = seconds;

      timerInterval = setInterval(() => {
        timeLeft -= 1;
        if (timeLeft < 0) {
          clearInterval(timerInterval);
          if (!answered) {
            answered = true;
            document.querySelectorAll('.q-opt').forEach(b => b.classList.add('disabled'));
          }
          return;
        }
        timeDisplay.textContent = timeLeft;
        fill.style.width = `${(timeLeft / seconds) * 100}%`;
        fill.classList.remove('warning', 'danger');
        if (timeLeft <= 5) fill.classList.add('danger');
        else if (timeLeft <= 10) fill.classList.add('warning');
      }, 1000);
    }

    // Show join screen by default
    showScreen('join-screen');
  </script>
</body>
</html>
